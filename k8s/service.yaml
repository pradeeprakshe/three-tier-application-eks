# k8s/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: bookstore-dev
spec:
  selector:
    app: backend                      # ← routes to pods with this label
  ports:
    - name: http
      protocol: TCP
      port: 80                        # ← service port
      targetPort: 80                  # ← pod port
  type: ClusterIP                     # ← internal only (we'll add Ingress later)
