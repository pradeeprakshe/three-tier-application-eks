# Default values for backend chart

replicaCount: 1

image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

config:
  NODE_ENV: "production"
  PORT: "3000"
  DB_HOST: "postgresql-service"
  DB_PORT: "5432"
  DB_NAME: "bookstore"
  LOG_LEVEL: "info"

secret:
  DB_USER: "Ym9va3N0b3JlX3VzZXI="
  DB_PASSWORD: "Ym9va3N0b3JlX3Bhc3M="
  DB_NAME: "Ym9va3N0b3Jl"

probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
